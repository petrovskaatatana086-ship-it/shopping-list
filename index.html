<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#635BFF">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3737/3737372.png">
    
    <link rel="manifest" href='data:application/json,{"name":"Smart Shopping Pro","short_name":"Shopping","start_url":".","display":"standalone","background_color":"#635BFF","theme_color":"#635BFF","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3737/3737372.png","sizes":"512x512","type":"image/png"}]}'>

    <title>Умные Покупки Pro Live</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, updateDoc, collection };
    </script>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Manrope', 'sans-serif'] } } } }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, button, select { outline: none !important; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mic-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .zap-pulse { animation: zap 1.2s infinite; }
        @keyframes zap { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const DICTIONARY = {
            'овощи': ['помидор', 'огурец', 'картоф', 'лук', 'морков', 'капуст', 'яблок', 'банан', 'апельсин', 'лимон', 'груш', 'салат', 'зелень', 'чеснок', 'перец', 'авокадо', 'киви', 'ягода', 'арбуз', 'дыня', 'кабачок', 'баклажан', 'свёкла', 'редис', 'укроп', 'петрушк', 'сельдерей', 'гриб'],
            'мясо': ['куриц', 'курица', 'мясо', 'говядин', 'свинин', 'рыба', 'фарш', 'колбас', 'сосиск', 'индейк', 'стейк', 'лосось', 'креветк', 'бекон', 'фарш', 'котлет', 'печень', 'ветчин', 'сибас', 'форель'],
            'молочка': ['молок', 'кефир', 'творог', 'сыр', 'йогурт', 'сметан', 'масло', 'сливки', 'яйц', 'сгущенка', 'ряженка', 'маскарпоне', 'пармезан'],
            'бакалея': ['мука', 'сахар', 'соль', 'рис', 'макарон', 'гречк', 'овсянк', 'хлеб', 'печенье', 'шоколад', 'конфет', 'чай', 'кофе', 'масло', 'соус', 'кетчуп', 'булка', 'багет', 'крупа', 'чечевица', 'нут', 'вафли', 'зефир'],
            'уход': ['шампунь', 'мыло', 'паста', 'щетка', 'крем', 'гель', 'дезодорант', 'бритв', 'духи', 'ватные', 'подгузники', 'маска', 'лосьон', 'бальзам'],
            'аптека': ['витамин', 'таблетки', 'пластырь', 'бинты', 'аспирин', 'мазь', 'сироп', 'капли', 'антисептик', 'нурофен', 'парацетамол'],
            'дом': ['порошок', 'губка', 'средство', 'бумага', 'салфетки', 'освежитель', 'пакеты', 'лампочка', 'батарейки', 'стирка']
        };

        const UNITS = ['шт', 'кг', 'г', 'л', 'мл', 'упак'];

        // ГАРАНТИРОВАННЫЕ SVG ИКОНКИ
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconMic = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>;
        const IconBrush = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"></path><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.21 0 4-1.79 4-4.04a3.01 3.01 0 0 0-3-3.02z"></path></svg>;
        const IconBack = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconClose = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconCheck = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconDelete = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

        function App() {
            const PRIORITIES = useMemo(() => [
                { id: 'low', label: 'Не к спеху', icon: '🕒', color: 'text-slate-400 bg-slate-100' },
                { id: 'medium', label: 'Обычный', icon: '➖', color: 'text-[#635BFF] bg-indigo-50' },
                { id: 'high', label: 'Срочно', icon: '⚡', color: 'text-red-500 bg-red-50' }
            ], []);

            const CATEGORIES = useMemo(() => [
                { id: 'овощи', label: 'Овощи/Фрукты', icon: '🍎', color: 'text-orange-500', bg: 'bg-orange-50', border: 'border-orange-100' },
                { id: 'мясо', label: 'Мясо/Рыба', icon: '🥩', color: 'text-red-500', bg: 'bg-red-50', border: 'border-red-100' },
                { id: 'молочка', label: 'Молочное', icon: '🥛', color: 'text-blue-500', bg: 'bg-blue-50', border: 'border-blue-100' },
                { id: 'бакалея', label: 'Продукты', icon: '🍞', color: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-100' },
                { id: 'уход', label: 'Уход/Красота', icon: '✨', color: 'text-pink-500', bg: 'bg-pink-50', border: 'border-pink-100' },
                { id: 'аптека', label: 'Аптека', icon: '💊', color: 'text-emerald-500', bg: 'bg-emerald-50', border: 'border-emerald-100' },
                { id: 'дом', label: 'Для дома', icon: '🏠', color: 'text-slate-500', bg: 'bg-slate-50', border: 'border-slate-100' },
            ], []);

            const LOCATIONS = useMemo(() => [
                { id: 'магазин', label: 'Магазин', icon: '🛒' },
                { id: 'рынок', label: 'Рынок', icon: '🧺' },
                { id: 'онлайн', label: 'Онлайн', icon: '🚚' },
            ], []);

            const [activeLoc, setActiveLoc] = useState('магазин');
            const [activeCat, setActiveCat] = useState('бакалея');
            const [activePriority, setActivePriority] = useState('medium');
            const [view, setView] = useState('main'); 
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [inputValue, setInputValue] = useState('');
            const [inputQty, setInputQty] = useState('1');
            const [inputUnit, setInputUnit] = useState('шт');
            const [toast, setToast] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [isListening, setIsListening] = useState(false);
            const [sharedId, setSharedId] = useState(() => new URLSearchParams(window.location.search).get('listId'));
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);

            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('ss_items_v19')) || {});
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('ss_hist_v19')) || []);

            useEffect(() => {
                const initCloud = async () => {
                    if (typeof window.FB === 'undefined') return;
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                        if (typeof __firebase_config === 'undefined') return;
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { await signInAnonymously(auth); }
                        onAuthStateChanged(auth, setUser);
                    } catch (e) { console.error(e); }
                };
                initCloud();
            }, []);

            useEffect(() => {
                if (!db || !sharedId || !user) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const docRef = FB.doc(db, 'artifacts', appId, 'public', 'data', 'lists', sharedId);
                const unsubscribe = FB.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setItems(data.items || {});
                        setHistory(data.history || []);
                    }
                }, (err) => showToast("Ошибка синхронизации"));
                return () => unsubscribe();
            }, [db, sharedId, user]);

            useEffect(() => {
                if (!sharedId) {
                    localStorage.setItem('ss_items_v19', JSON.stringify(items));
                    localStorage.setItem('ss_hist_v19', JSON.stringify(history));
                }
                const updateStatus = () => setIsOnline(navigator.onLine);
                window.addEventListener('online', updateStatus);
                window.addEventListener('offline', updateStatus);
                return () => { window.removeEventListener('online', updateStatus); window.removeEventListener('offline', updateStatus); };
            }, [items, history, sharedId]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

            const updateState = async (newItems, newHistory = history) => {
                if (sharedId && db && user) {
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        const docRef = FB.doc(db, 'artifacts', appId, 'public', 'data', 'lists', sharedId);
                        await FB.updateDoc(docRef, { items: newItems, history: newHistory });
                    } catch (e) { showToast("Ошибка сохранения"); }
                } else { setItems(newItems); setHistory(newHistory); }
            };

            const handleDetection = (val) => {
                setInputValue(val);
                if (val.length < 2) return;
                const lower = val.toLowerCase();
                for (const [catId, keywords] of Object.entries(DICTIONARY)) {
                    if (keywords.some(kw => lower.includes(kw))) { setActiveCat(catId); break; }
                }
            };

            const startVoice = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return showToast("Голос не поддерживается");
                const rec = new SR(); rec.lang = 'ru-RU';
                rec.onstart = () => setIsListening(true);
                rec.onresult = (e) => { handleDetection(e.results[0][0].transcript); setIsListening(false); };
                rec.onerror = () => setIsListening(false);
                rec.onend = () => setIsListening(false);
                rec.start();
            };

            const addItem = () => {
                if (!inputValue.trim()) return;
                const newItem = { id: Date.now(), text: inputValue.trim(), quantity: inputQty || '1', unit: inputUnit, priority: activePriority, completed: false, category: activeCat, location: activeLoc };
                const newItems = {...items, [activeLoc]: [newItem, ...(items[activeLoc] || [])]};
                updateState(newItems);
                setInputValue(''); setInputQty('1'); setActivePriority('medium');
                showToast(`Добавлено: ${newItem.text}`);
            };

            const toggleItem = (id) => {
                const currentLocItems = items[activeLoc] || [];
                let movedItem = null;
                const updatedList = currentLocItems.map(item => {
                    if (item.id === id) {
                        const isDone = !item.completed;
                        if (isDone) movedItem = item;
                        return { ...item, completed: isDone };
                    }
                    return item;
                });
                const newItems = {...items, [activeLoc]: updatedList};
                let newHistory = history;
                if (movedItem) newHistory = [{ ...movedItem, doneAt: new Date().toISOString() }, ...history].slice(0, 50);
                updateState(newItems, newHistory);
            };

            const grouped = useMemo(() => {
                const grp = {};
                (items[activeLoc] || []).forEach(item => {
                    if (!grp[item.category]) grp[item.category] = [];
                    grp[item.category].push(item);
                });
                return grp;
            }, [items, activeLoc]);

            return (
                <div className="min-h-screen flex justify-center items-start sm:p-6 text-slate-800 font-sans">
                    <div className="w-full max-w-md bg-white min-h-screen sm:min-h-[850px] sm:rounded-[45px] shadow-2xl flex flex-col relative border border-white overflow-hidden transition-all duration-500">
                        
                        {!isOnline && <div className="bg-amber-500 text-white text-[10px] font-black uppercase py-1 text-center animate-pulse z-50">Автономный режим</div>}
                        {sharedId && <div className="bg-[#635BFF] text-white text-[10px] font-black uppercase py-1 text-center z-50">Общий список активен</div>}

                        <header className="px-8 pt-10 pb-6 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-40 border-b border-slate-50">
                            {view === 'main' ? (
                                <>
                                    <div className="flex-1">
                                        <h1 className="text-2xl font-black tracking-tighter">Умные<span className="text-[#635BFF]">Покупки</span></h1>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">{(items[activeLoc] || []).filter(i=>!i.completed).length} поз. осталось</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setView('history')} 
                                            className="px-4 h-10 flex items-center justify-center rounded-xl bg-indigo-50 text-[#635BFF] text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all"
                                        >
                                            история
                                        </button>
                                    </div>
                                </>
                            ) : (
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setView('main')} className="p-2 hover:bg-slate-100 rounded-xl transition-all"><IconBack /></button>
                                    <h1 className="text-xl font-black">История</h1>
                                </div>
                            )}
                        </header>

                        {view === 'main' ? (
                            <>
                                <div className="px-8 mb-4 pt-4">
                                    <div className="bg-[#EEF1F8] p-1.5 rounded-3xl flex gap-1 shadow-inner border border-slate-100">
                                        {LOCATIONS.map(loc => (
                                            <button key={loc.id} onClick={() => setActiveLoc(loc.id)} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl text-[11px] font-black transition-all ${activeLoc === loc.id ? 'bg-white text-[#635BFF] shadow-md scale-[1.02]' : 'text-slate-400'}`}>
                                                <span className="text-base">{loc.icon}</span> {loc.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="px-6 mb-4 sticky top-[105px] z-30">
                                    <div className="bg-white rounded-[32px] shadow-[0_15px_40px_rgba(99,91,255,0.12)] border border-slate-100 p-5 space-y-4">
                                        <div className="flex gap-2 overflow-x-auto pb-1 no-scrollbar items-center">
                                            {CATEGORIES.map(cat => (
                                                <button key={cat.id} onClick={() => setActiveCat(cat.id)} className={`flex items-center gap-2 px-3.5 py-2 rounded-2xl text-[10px] font-black whitespace-nowrap transition-all border-2 ${activeCat === cat.id ? `${cat.bg} ${cat.color} border-current` : 'bg-slate-50 text-slate-300 border-transparent'}`}>
                                                    <span className="text-sm">{cat.icon}</span> {cat.label.toUpperCase()}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="flex gap-3 items-center">
                                            <div className="relative flex-[4]"><input type="text" placeholder="Что купить?" className="w-full bg-slate-50 rounded-2xl pl-6 pr-4 py-4 outline-none font-bold text-slate-700 placeholder:text-slate-300 transition-all focus:ring-2 focus:ring-[#635BFF]/20" value={inputValue} onChange={(e) => handleDetection(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addItem()} /></div>
                                            <div className="flex flex-[2.5] bg-slate-50 rounded-2xl items-center px-2">
                                                <input type="number" step="any" className="w-10 bg-transparent text-center font-black text-[#635BFF] py-4 text-xs" value={inputQty} onChange={(e) => setInputQty(e.target.value)} />
                                                <select className="bg-transparent text-[10px] font-black text-slate-400 cursor-pointer appearance-none" value={inputUnit} onChange={(e) => setInputUnit(e.target.value)}>{UNITS.map(u => <option key={u} value={u}>{u}</option>)}</select>
                                            </div>
                                            <button onClick={addItem} className="bg-[#635BFF] text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 flex-none">
                                                <IconPlus />
                                            </button>
                                        </div>

                                        <div className="flex gap-2">
                                            {PRIORITIES.map(p => (
                                                <button 
                                                    key={p.id} 
                                                    onClick={() => setActivePriority(p.id)} 
                                                    className={`flex-1 py-3 rounded-xl transition-all border-2 flex items-center justify-center ${activePriority === p.id ? `border-[#635BFF]/30 ${p.color} scale-[1.02] shadow-sm` : 'bg-slate-50 border-transparent text-slate-300'}`}
                                                >
                                                    <span className={`text-sm ${p.id === 'high' && activePriority === p.id ? 'zap-pulse' : ''}`}>{p.icon}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <main className="flex-1 px-8 overflow-y-auto pb-44 no-scrollbar">
                                    {Object.keys(grouped).length === 0 ? (
                                        <div className="py-20 flex flex-col items-center opacity-20 text-center animate-pop">
                                            <span className="text-6xl mb-4">🛒</span>
                                            <p className="text-xs font-black uppercase tracking-widest">Список пуст</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-8">
                                            {CATEGORIES.filter(c => grouped[c.id]).map(cat => (
                                                <div key={cat.id} className="animate-pop">
                                                    <div className="flex items-center gap-3 mb-4 opacity-40"><span className={`text-[10px] font-black uppercase tracking-[0.2em] ${cat.color}`}>{cat.icon} {cat.label}</span><div className="h-[1px] flex-1 bg-slate-100"></div></div>
                                                    <div className="space-y-3">
                                                        {grouped[cat.id].map(item => {
                                                            const pObj = PRIORITIES.find(p => p.id === item.priority) || PRIORITIES[1];
                                                            return (
                                                                <div key={item.id} className={`group flex items-center gap-4 p-5 rounded-[28px] border-2 transition-all ${item.completed ? 'bg-slate-50 opacity-60 border-transparent' : `bg-white ${cat.border} shadow-sm hover:shadow-md hover:scale-[1.01]`}`}>
                                                                    <div onClick={() => toggleItem(item.id)} className={`cursor-pointer transition-all duration-300 ${item.completed ? 'text-green-500' : 'text-slate-200'}`}>
                                                                        {item.completed ? <div className="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-white"><IconCheck /></div> : <div className="w-6 h-6 border-2 border-slate-200 rounded-full"></div>}
                                                                    </div>
                                                                    <div className="flex flex-col flex-1" onClick={() => toggleItem(item.id)}>
                                                                        <div className="flex items-center gap-2"><span className={`font-bold ${item.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>{item.text}</span>{item.priority === 'high' && !item.completed && <span className="text-red-500 animate-pulse text-xs">⚠️</span>}</div>
                                                                        <div className="flex items-center gap-2 mt-1">
                                                                            <span className="text-[10px] font-black text-[#635BFF] opacity-80 uppercase">{item.quantity} {item.unit}</span>
                                                                            <span className={`text-[8px] px-2 py-0.5 rounded-full font-black uppercase tracking-tighter ${pObj.color}`}>{pObj.icon} {pObj.label}</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => setEditingItem(item)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-[#635BFF] p-1 transition-all"><IconBrush /></button>
                                                                        <button onClick={() => { const ni = {...items, [activeLoc]: (items[activeLoc]||[]).filter(i=>i.id!==item.id)}; updateState(ni); }} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-400 p-1 transition-all"><IconDelete /></button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </main>

                                <div className="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white/95 to-transparent z-40 flex items-center gap-3">
                                    <button onClick={() => {
                                        if (!db || !user) return showToast("Подключение...");
                                        const newId = Math.random().toString(36).substring(2, 15);
                                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                                        FB.setDoc(FB.doc(db, 'artifacts', appId, 'public', 'data', 'lists', newId), { items, history, createdAt: new Date().toISOString(), owner: user.uid });
                                        const url = `${window.location.origin}${window.location.pathname}?listId=${newId}`;
                                        const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
                                        setSharedId(newId); showToast("Ссылка скопирована!");
                                    }} className="flex-1 h-16 bg-[#121221] text-white rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all">🔗 {sharedId ? "Ссылка" : "Общий доступ"}</button>
                                    <button onClick={startVoice} className={`w-16 h-16 rounded-2xl flex items-center justify-center shadow-xl transition-all active:scale-95 z-50 ${isListening ? 'bg-red-500 text-white mic-pulse' : 'bg-[#635BFF] text-white hover:bg-[#4B43B2]'}`}>
                                        <IconMic />
                                    </button>
                                    <button onClick={() => { 
                                        const d = JSON.stringify({ items, history }, null, 2); 
                                        const uri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(d); 
                                        const l = document.createElement('a'); l.href = uri; l.download = 'shopping.json'; l.click(); 
                                    }} className="w-16 h-16 bg-white border-2 border-slate-100 text-slate-300 rounded-[24px] flex items-center justify-center shadow-lg transition-all active:scale-95 text-lg">💾</button>
                                </div>
                            </>
                        ) : (
                            <main className="flex-1 px-8 overflow-y-auto pb-10 pt-4 no-scrollbar">
                                {history.length === 0 ? <div className="py-20 flex flex-col items-center opacity-20"><span className="text-6xl">⏳</span><p className="font-black text-xs mt-4">История пуста</p></div> : <div className="space-y-4 pt-4">{history.map((h, i) => (<div key={i} className="bg-slate-50 p-5 rounded-[28px] border border-slate-100 animate-pop"><div className="flex justify-between items-start"><div className="flex flex-col"><span className="font-black text-lg leading-none">{h.text}</span><span className="text-[10px] font-bold text-[#635BFF] mt-1 uppercase tracking-wider">{h.quantity} {h.unit}</span></div><div className="flex flex-col items-end"><span className="text-[9px] font-black text-slate-300 uppercase">{new Date(h.doneAt).toLocaleDateString()}</span><span className="text-[8px] font-bold text-[#635BFF] uppercase opacity-50 mt-1">{h.location}</span></div></div></div>))} <button onClick={() => updateState(items, [])} className="w-full py-6 text-[10px] font-black uppercase text-slate-300 hover:text-red-400 transition-colors">Очистить историю</button></div>}
                            </main>
                        )}

                        {editingItem && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-md z-[100] flex items-end sm:items-center justify-center p-4">
                                <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl animate-pop border border-white no-scrollbar overflow-y-auto max-h-[90vh]">
                                    <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black">Правка</h2><button onClick={() => setEditingItem(null)} className="p-2 bg-slate-50 rounded-full text-slate-400"><IconClose /></button></div>
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Название</label>
                                            <input type="text" className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-bold outline-none border border-slate-100 focus:border-[#635BFF]" value={editingItem.text} onChange={(e) => setEditingItem({...editingItem, text: e.target.value})} />
                                        </div>
                                        <div className="flex gap-4"><div className="flex-1"><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-2">Кол-во</label><input type="number" step="any" className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-black text-[#635BFF] border border-slate-100" value={editingItem.quantity} onChange={(e) => setEditingItem({...editingItem, quantity: e.target.value})} /></div><div className="flex-1"><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-2">Ед. изм.</label><select className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-black text-[#635BFF] appearance-none border border-slate-100" value={editingItem.unit} onChange={(e) => setEditingItem({...editingItem, unit: e.target.value})}>{UNITS.map(u => <option key={u} value={u}>{u}</option>)}</select></div></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Приоритет</label><div className="flex gap-2">{PRIORITIES.map(p => (<button key={p.id} onClick={() => setEditingItem({...editingItem, priority: p.id})} className={`flex-1 py-3 rounded-xl transition-all border-2 flex items-center justify-center ${editingItem.priority === p.id ? `border-[#635BFF] ${p.color}` : 'border-transparent bg-slate-50 text-slate-400'}`}>{p.icon} {p.label}</button>))}</div></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Локация</label><div className="grid grid-cols-3 gap-2">{LOCATIONS.map(l => (<button key={l.id} onClick={() => setEditingItem({...editingItem, location: l.id})} className={`py-3 rounded-xl text-[10px] font-black border-2 flex flex-col items-center gap-1 ${editingItem.location === l.id ? 'border-[#635BFF] bg-indigo-50 text-[#635BFF]' : 'border-transparent bg-slate-50 text-slate-400'}`}>{l.icon} {l.label}</button>))}</div></div>
                                        <button onClick={() => { const ns = {...items}; let oldLoc = null; for (const loc in items) { if (items[loc].some(i => i.id === editingItem.id)) { oldLoc = loc; break; } } if (oldLoc && editingItem.location !== oldLoc) { ns[oldLoc] = ns[oldLoc].filter(i => i.id !== editingItem.id); ns[editingItem.location] = [editingItem, ...(ns[editingItem.location] || [])]; } else { ns[editingItem.location] = (ns[editingItem.location] || []).map(i => i.id === editingItem.id ? editingItem : i); } updateState(ns); setEditingItem(null); showToast('Сохранено'); }} className="w-full bg-[#635BFF] py-5 rounded-[24px] text-white font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Сохранить</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {toast && <div className="fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-2.5 rounded-2xl shadow-2xl text-[11px] font-black z-[60] animate-pop">{toast}</div>}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
